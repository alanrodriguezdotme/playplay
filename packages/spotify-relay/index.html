<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayPlay – Spotify Connect</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #121212;
            color: #fff;
        }

        .card {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #1DB954;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: #ff4444;
        }

        a {
            color: #1DB954;
        }
    </style>
</head>

<body>
    <div class="card" id="content">
        <div class="spinner"></div>
        <p>Connecting to Spotify...</p>
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var code = params.get("code");
            var state = params.get("state");
            var error = params.get("error");
            var el = document.getElementById("content");

            if (error) {
                el.innerHTML = '<p class="error">Spotify authorization failed: ' + error + "</p>" +
                    "<p>You can close this tab.</p>";
                return;
            }

            if (!code || !state) {
                el.innerHTML = '<p class="error">Missing authorization parameters.</p>' +
                    "<p>Please try connecting again from your PlayPlay admin settings.</p>";
                return;
            }

            // state format: {venueId}:{port}:{returnUrl}
            var firstColon = state.indexOf(":");
            var secondColon = state.indexOf(":", firstColon + 1);
            var venueId, port, returnUrl;

            if (secondColon === -1) {
                // Legacy: {venueId}:{port}
                venueId = state.substring(0, firstColon);
                port = state.substring(firstColon + 1);
                returnUrl = "";
            } else {
                venueId = state.substring(0, firstColon);
                port = state.substring(firstColon + 1, secondColon);
                returnUrl = state.substring(secondColon + 1);
            }

            if (!venueId || !port || isNaN(Number(port))) {
                el.innerHTML = '<p class="error">Invalid state parameter.</p>' +
                    "<p>Please try connecting again from your PlayPlay admin settings.</p>";
                return;
            }

            var localUrl = "http://localhost:" + port + "/api/spotify/callback-local" +
                "?code=" + encodeURIComponent(code) +
                "&state=" + encodeURIComponent(venueId) +
                (returnUrl ? "&returnUrl=" + encodeURIComponent(returnUrl) : "");

            window.location.href = localUrl;
        })();
    </script>
</body>

</html>
